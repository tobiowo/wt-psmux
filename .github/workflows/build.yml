name: Build

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Check weekly if upstream terminal has new releases
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check-patch:
    name: Verify patch applies cleanly
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply patches
        shell: pwsh
        run: ./apply-patches.ps1

  build:
    name: Build (${{ matrix.platform }})
    needs: check-patch
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Apply patches
        shell: pwsh
        run: ./apply-patches.ps1

      - name: Detect Windows SDK version
        shell: pwsh
        run: |
          $sdk = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" |
            Where-Object { $_.Name -match '10\.0\.\d+' } |
            Sort-Object Name -Descending |
            Select-Object -First 1).Name
          Write-Host "Using Windows SDK: $sdk"
          "WIN_SDK=$sdk" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        working-directory: terminal
        run: nuget restore OpenConsole.slnx

      - name: Build WindowsTerminal
        working-directory: terminal
        run: |
          msbuild src\cascadia\WindowsTerminal\WindowsTerminal.vcxproj `
            /p:Platform=${{ matrix.platform }} `
            /p:Configuration=Release `
            /p:SolutionDir="${{ github.workspace }}\terminal\" `
            /p:WindowsTargetPlatformVersion=${{ env.WIN_SDK }} `
            /p:BuildProjectReferences=true `
            /m /v:minimal

      - name: Build wt shim
        working-directory: terminal
        run: |
          msbuild src\cascadia\wt\wt.vcxproj `
            /p:Platform=${{ matrix.platform }} `
            /p:Configuration=Release `
            /p:SolutionDir="${{ github.workspace }}\terminal\" `
            /p:WindowsTargetPlatformVersion=${{ env.WIN_SDK }} `
            /p:BuildProjectReferences=false `
            /m /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wt-psmux-${{ matrix.platform }}
          path: |
            terminal/bin/${{ matrix.platform }}/Release/WindowsTerminal.exe
            terminal/bin/${{ matrix.platform }}/Release/wt.exe

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # need terminal submodule to read its version tag

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get terminal version
        id: version
        run: |
          tag=$(git -C terminal describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}-psmux
          name: ${{ steps.version.outputs.tag }} + psmux patches
          body: |
            Patched build of Windows Terminal ${{ steps.version.outputs.tag }}.

            **Changes over upstream:**
            - `wt close-tab [-t <index>]` — close a tab by index (or the active tab)
            - `wt rename-tab <title>` — rename a tab by sending a title to the active tab

            **Usage:**
            Drop `WindowsTerminal.exe` and `wt.exe` into your Windows Terminal installation directory.
          files: artifacts/**/*.exe
